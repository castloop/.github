name: Bug report
description: Something is broken or not behaving as documented.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Clear, reproducible reports get fixed fastest.

  - type: input
    id: repo
    attributes:
      label: Affected repo
      placeholder: e.g. castloop/core
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. v0.1.0 or commit sha
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, engine version (Unreal/Unity), Rust toolchain, hardware — whatever is relevant.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs in a code block. Attach screenshots if helpful.
    validations:
      required: false
